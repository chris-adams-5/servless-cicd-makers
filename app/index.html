<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            resize: vertical;
            min-height: 100px;
            font-family: sans-serif;
        }

        textarea:focus {
            outline: none;
            border-color: #4a90e2;
        }

        button {
            margin-top: 12px;
            padding: 10px 24px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        .response-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            min-height: 60px;
            white-space: pre-wrap;
        }

        .loading {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Assistant</h1>
        <p class="subtitle">Powered by TinyLlama — running entirely inside this container, no API keys required.</p>

        <textarea id="prompt" placeholder="Ask something..."></textarea>
        <br>
        <button id="ask-btn" onclick="ask()">Ask</button>

        <div class="response-box" id="response">Your answer will appear here.</div>
    </div>

    <script>
        async function ask() {
            const prompt = document.getElementById("prompt").value.trim();
            if (!prompt) return;

            const btn = document.getElementById("ask-btn");
            const responseBox = document.getElementById("response");

            btn.disabled = true;
            btn.textContent = "Thinking...";
            responseBox.textContent = "Waiting for response...";
            responseBox.classList.add("loading");

            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                const data = await res.json();
                responseBox.textContent = data.response;
            } catch (err) {
                responseBox.textContent = "Something went wrong. Please try again.";
            } finally {
                responseBox.classList.remove("loading");
                btn.disabled = false;
                btn.textContent = "Ask";
            }
        }

        document.getElementById("prompt").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && e.ctrlKey) ask();
        });
    </script>
</body>
</html>
